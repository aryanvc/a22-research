<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>A22</title>
<meta name="description" content="A22 — the portfolio, on film.">
<link rel="stylesheet" href="assets/css/landing.css">
</head>
<body>

<div class="curtain" id="curtain">
  <div class="curtain-plate">
    <div class="curtain-mark">A22</div>
  </div>
  <div class="veil-grain"></div>
  <div class="curtain-lit" aria-hidden="true">
    <div class="curtain-mark">A22</div>
  </div>
  <div class="grain"></div>
</div>
<div class="lens" id="lens"></div>

<nav class="nav">
  <a class="mark" href="index.html">A22</a>
  <span class="links">
    <a href="research/index.html">Research</a>
  </span>
</nav>

<main class="theater">
  <div class="room-glow" id="glow-a"></div>
  <div class="room-glow" id="glow-b"></div>

  <div class="frame-wrap">
    <div class="frame" id="frame">
      {{FILMS}}
      <div class="grain"></div>
      <div class="shutter" id="shutter"></div>
    </div>
    <div class="progress"><span id="progress-bar"></span></div>
    <div class="titles" id="titles">
      <span class="file-no" id="t-file"></span>
      <h1 class="film-name" id="t-name"></h1>
      <span class="stage-tag" id="t-stage"></span>
    </div>
  </div>

  <button class="arrow arrow-prev" id="prev" aria-label="Previous">←</button>
  <button class="arrow arrow-next" id="next" aria-label="Next">→</button>

  <aside class="rail" id="rail">
    {{RAIL}}
  </aside>

  <footer class="bar">
    <span>© {{YEAR}} A22</span>
    <a href="research/index.html">A22 Research →</a>
  </footer>
</main>

<script>
(() => {
  const films = [...document.querySelectorAll(".film")];
  const idx = [...document.querySelectorAll(".idx")];
  const glows = [document.getElementById("glow-a"), document.getElementById("glow-b")];
  const shutter = document.getElementById("shutter");
  const bar = document.getElementById("progress-bar");
  const titles = document.getElementById("titles");
  const HOLD = 9000, SWEEP = 950;
  let current = 0, glowOn = 0, timer = null, locked = false, paused = false, entered = false;

  function setTitles(f) {
    document.getElementById("t-file").textContent = f.dataset.file;
    document.getElementById("t-name").textContent = f.dataset.name;
    document.getElementById("t-stage").textContent = f.dataset.stage;
    titles.classList.remove("enter");
    void titles.offsetWidth; // restart entrance animation
    titles.classList.add("enter");
  }

  function setGlow(hue) {
    const next = glows[1 - glowOn];
    next.style.setProperty("--h", hue);
    next.classList.add("on");
    glows[glowOn].classList.remove("on");
    glowOn = 1 - glowOn;
  }

  function media(f) { return f.querySelector("video"); }

  function runProgress() {
    bar.style.transition = "none";
    bar.style.width = "0";
    void bar.offsetWidth;
    bar.style.transition = `width ${HOLD}ms linear`;
    bar.style.width = "100%";
  }

  function show(i, instant = false) {
    if (locked) return;
    const target = (i + films.length) % films.length;
    if (target === current && !instant) return;
    locked = true;

    const from = films[current], to = films[target];
    current = target;
    idx.forEach((a, n) => a.classList.toggle("current", n === current));
    setGlow(to.style.getPropertyValue("--h") || "214");

    if (instant) {
      to.classList.add("active");
      setTitles(to);
      const v = media(to); if (v) v.play();
      locked = false;
      schedule();
      return;
    }

    shutter.classList.remove("sweep");
    void shutter.offsetWidth;
    shutter.classList.add("sweep");

    setTimeout(() => {           // midpoint of the sweep: swap reels
      from.classList.remove("active");
      to.classList.add("active");
      const vf = media(from); if (vf) vf.pause();
      const vt = media(to); if (vt) { vt.currentTime = 0; vt.play(); }
      setTitles(to);
    }, SWEEP * 0.45);

    setTimeout(() => { locked = false; schedule(); }, SWEEP);
  }

  function schedule() {
    clearTimeout(timer);
    if (paused || !entered) return;
    runProgress();
    timer = setTimeout(() => show(current + 1), HOLD);
  }

  // ---- cold open: the veil ----
  // the cursor carries a breathing pool of light that melts through the
  // curtain; clicking anywhere lifts it
  const curtain = document.getElementById("curtain");
  const lens = document.getElementById("lens");
  let tx = innerWidth / 2, ty = innerHeight * 0.44, vx = tx, vy = ty;
  const t0 = performance.now();

  addEventListener("mousemove", e => { tx = e.clientX; ty = e.clientY; });

  function veil(now) {
    if (!curtain.isConnected) return;
    vx += (tx - vx) * 0.09;                       // the light trails the hand
    vy += (ty - vy) * 0.09;
    const r = 150 + Math.sin((now - t0) / 950) * 16;  // it breathes
    for (const el of [curtain, lens]) {
      el.style.setProperty("--mx", vx + "px");
      el.style.setProperty("--my", vy + "px");
      el.style.setProperty("--r", r + "px");
    }
    requestAnimationFrame(veil);
  }
  requestAnimationFrame(veil);

  function enter() {
    if (entered) return;
    entered = true;
    curtain.classList.add("exit");
    lens.classList.add("off");
    document.body.classList.add("entered");
    const v = media(films[current]); if (v) v.play();
    setTimeout(() => { curtain.remove(); lens.remove(); }, 1700);
    setTimeout(() => { setTitles(films[current]); schedule(); }, 1150);
  }
  curtain.addEventListener("click", enter);
  document.addEventListener("keydown", e => { if (!entered && e.key === "Enter") enter(); });

  document.getElementById("prev").addEventListener("click", () => show(current - 1));
  document.getElementById("next").addEventListener("click", () => show(current + 1));
  idx.forEach((a, n) => a.addEventListener("click", e => { e.preventDefault(); show(n); }));
  document.addEventListener("keydown", e => {
    if (e.key === "ArrowLeft") show(current - 1);
    if (e.key === "ArrowRight") show(current + 1);
  });

  const frame = document.getElementById("frame");
  frame.addEventListener("mouseenter", () => { paused = true; clearTimeout(timer);
    bar.style.transition = "none"; });
  frame.addEventListener("mouseleave", () => { paused = false; schedule(); });

  // touch: tap left/right half of the frame
  frame.addEventListener("click", e => {
    if (window.matchMedia("(hover: hover)").matches) return;
    const x = e.clientX - frame.getBoundingClientRect().left;
    show(current + (x < frame.clientWidth / 2 ? -1 : 1));
  });

  films.forEach(f => { const v = media(f); if (v && !f.classList.contains("active")) v.pause(); });
  show(0, true);
})();
</script>
</body>
</html>
